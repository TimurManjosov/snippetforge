# CI Pipeline for SnippetForge Monorepo (apps/api + apps/web)
# Scope: Lint, type-check, test, and build on every PR and push to main/master.
# No deployment, no secrets, no CD – pure quality gates.

name: CI

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: "Lint (api + web)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linters
        run: npm run lint

  typecheck:
    name: "Type Check (api + web)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run type checking
        run: npm run typecheck

  test:
    name: "Test (api + web)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: snippetforge
          POSTGRES_PASSWORD: dev_password
          POSTGRES_DB: snippetforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U snippetforge"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://snippetforge:dev_password@localhost:5432/snippetforge
      JWT_SECRET: test-secret-key-for-ci-minimum-32-characters
      JWT_EXPIRES_IN: 15m
      NODE_ENV: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm -w apps/api exec drizzle-kit push

      - name: Run tests
        run: npm test --if-present

  build:
    name: "Build (api + web)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build

# ============================================================================
